{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 420px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title text-center mb-3">Login</h4>

            {% if messages %}
                {% for m in messages %}
                    <div class="alert alert-danger">{{ m }}</div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-2">
                    <input 
                        type="text" 
                        name="username" 
                        class="form-control" 
                        placeholder="Username" 
                        required
                    >
                </div>

                <div class="mb-3">
                    <input 
                        type="password" 
                        name="password" 
                        class="form-control" 
                        placeholder="Password" 
                        required
                    >
                </div>

                <button class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
