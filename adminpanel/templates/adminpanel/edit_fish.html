<!DOCTYPE html>
<html>
<head>
    <title>Edit Fish Item - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f8ff; }
        .container { max-width: 900px; }
        .form-control, .form-select { border-radius: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">FishNet Admin Panel</span>
        <a href="{% url 'manage_fish' %}" class="btn btn-light btn-sm">Back to Fish Management</a>
    </div>
</nav>

<div class="container mt-5">
    <h3 class="fw-bold text-primary mb-4">Edit Fish Item</h3>

    <form method="POST" enctype="multipart/form-data" class="card p-4 shadow-sm">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Fish Name</label>
                <input type="text" name="name" class="form-control" value="{{ fish.name }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    {% for c in categories %}
                        <option value="{{ c.id }}" {% if fish.category.id == c.id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Price (₹ / kg)</label>
                <input type="number" step="0.01" name="price" class="form-control" value="{{ fish.price_per_kg }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Stock (kg)</label>
                <input type="number" step="0.01" name="stock" class="form-control" value="{{ fish.stock }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Fish Image</label>
                <input type="file" name="image" accept="image/*" class="form-control">
                {% if fish.image %}
                <small class="text-muted">Current: <a href="{{ fish.image.url }}" target="_blank">View Image</a></small>
                {% endif %}
            </div>
        </div>
        <button type="submit" class="btn btn-success mt-4">Update Fish</button>
        <a href="{% url 'manage_fish' %}" class="btn btn-secondary mt-4">Cancel</a>
    </form>
</div>

</body>
</html>
