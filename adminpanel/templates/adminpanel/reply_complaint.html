<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reply to Complaint | FishNet Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">FishNet Admin</a>
        <a href="{% url 'view_complaints' %}" class="btn btn-light btn-sm">Back to Complaints</a>
    </div>
</nav>

<div class="container mt-4">
    <h3>Reply to Complaint</h3>
    
    <div class="card mt-3">
        <div class="card-body">
            <h5>{{ complaint.title }}</h5>
            <p class="text-muted">From: {{ complaint.fisherman.user.username }}</p>
            <p><strong>Description:</strong></p>
            <p>{{ complaint.description }}</p>
        </div>
    </div>
    
    <div class="card mt-3">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="admin_reply" class="form-label">Your Reply</label>
                    <textarea class="form-control" id="admin_reply" name="admin_reply" rows="5" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="Pending">Pending</option>
                        <option value="Resolved" selected>Resolved</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Send Reply</button>
                <a href="{% url 'view_complaints' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
