<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registered Users | FishNet Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        color: #1e293b;
    }

    .navbar {
        background: linear-gradient(90deg, #007aff, #0056d6);
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .navbar-brand {
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .nav-btn {
        background-color: white;
        color: #007aff;
        border: none;
        border-radius: 10px;
        padding: 6px 14px;
        font-weight: 500;
        transition: all 0.2s ease-in-out;
    }

    .nav-btn:hover {
        background-color: #e0e7ff;
        color: #0056d6;
    }

    h3 {
        font-weight: 700;
        color: #007aff;
        text-align: center;
        margin-top: 40px;
        margin-bottom: 30px;
    }

    .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        background-color: #fff;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }

    .table thead {
        background-color: #f1f5f9;
    }

    .table td, .table th {
        vertical-align: middle;
    }

    .btn-danger {
        background-color: #ef4444;
        border: none;
        border-radius: 8px;
        padding: 4px 10px;
        transition: all 0.2s ease-in-out;
    }

    .btn-danger:hover {
        background-color: #dc2626;
    }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="#">FishNet Admin</a>
        <div>
            <a href="/adminpanel/dashboard/" class="nav-btn me-2">Dashboard</a>
            
        </div>
    </div>
</nav>

<div class="container">
    <h3>Registered Users</h3>

    <div class="card p-4 fade-in">
        <table class="table align-middle mb-0">
            <thead>
                <tr>
                    <th scope="col">User ID</th>
                    <th scope="col">Username</th>
                    <th scope="col">Email</th>
                    <th scope="col">Role</th>
                    <th scope="col">Date Joined</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.role|title }}</td>
                    <td>{{ user.date_joined|date:"Y-m-d H:i" }}</td>
                    <td>
                        <a href="{% url 'remove_user' user.id %}" class="btn btn-danger btn-sm" 
                           onclick="return confirm('Are you sure you want to remove {{ user.username }}?')">
                           Remove
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="6" class="text-center text-muted py-4">No registered users found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
