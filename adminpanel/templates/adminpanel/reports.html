<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reports | FishNet Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        color: #1e293b;
    }

    .navbar {
        background: linear-gradient(90deg, #007aff, #0056d6);
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .navbar-brand {
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .nav-btn {
        background-color: white;
        color: #007aff;
        border: none;
        border-radius: 10px;
        padding: 6px 14px;
        font-weight: 500;
        transition: all 0.2s ease-in-out;
    }

    .nav-btn:hover {
        background-color: #e0e7ff;
        color: #0056d6;
    }

    h3 {
        font-weight: 700;
        color: #007aff;
        text-align: center;
        margin-top: 40px;
        margin-bottom: 30px;
    }

    .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        background-color: #fff;
        padding: 30px;
        margin-bottom: 20px;
    }

    .stat-card {
        text-align: center;
        padding: 20px;
        background: linear-gradient(135deg, #007aff, #0056d6);
        color: white;
        border-radius: 12px;
        margin-bottom: 20px;
    }

    .stat-card h2 {
        font-size: 2.5rem;
        font-weight: 700;
        margin: 0;
    }

    .stat-card p {
        margin: 10px 0 0 0;
        opacity: 0.9;
    }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="#">FishNet Admin</a>
        <div>
            <a href="/adminpanel/dashboard/" class="nav-btn me-2">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container">
    <h3>Sales & Inventory Reports</h3>

    <div class="row">
        <div class="col-md-6">
            <div class="stat-card">
                <h2>₹{{ total_sales|floatformat:2 }}</h2>
                <p>Total Sales</p>
            </div>
        </div>
    </div>

    <div class="card">
        <h4 class="mb-4">Fish Sales Summary</h4>
        <table class="table">
            <thead>
                <tr>
                    <th>Fish Name</th>
                    <th>Total Quantity Sold</th>
                </tr>
            </thead>
            <tbody>
                {% for fish in fish_sales %}
                <tr>
                    <td>{{ fish.fish_type }}</td>
                    <td>{{ fish.total_quantity|default:"0" }} kg</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center text-muted">No sales data available.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
