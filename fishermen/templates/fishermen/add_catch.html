{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="max-width:600px">
    <h4>Add Daily Catch</h4>
    <form method="post">
        {% csrf_token %}
        <div class="mb-2">
            <input type="text" name="fish_type" class="form-control" placeholder="Fish Type" required>
        </div>
        <div class="mb-2">
            <input type="number" step="0.01" name="quantity" class="form-control" placeholder="Quantity (kg)" required>
        </div>
        <div class="mb-3">
            <input type="number" step="0.01" name="price" class="form-control" placeholder="Price per kg" required>
        </div>
        <button class="btn btn-primary">Add Catch</button>
    </form>
</div>
{% endblock %}
