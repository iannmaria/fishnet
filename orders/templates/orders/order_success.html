{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-success">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                            <path d="M8 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2 class="text-success mb-3">Order Placed Successfully!</h2>
                    <p class="lead">Thank you for your purchase</p>
                    
                    <div class="mt-4 p-3 bg-light rounded">
                        <p class="mb-1"><strong>Order ID:</strong> #{{ order.id }}</p>
                        <p class="mb-1"><strong>Total Amount:</strong> ₹{{ order.total_amount|floatformat:2 }}</p>
                        <p class="mb-0"><strong>Status:</strong> <span class="badge bg-warning">{{ order.status }}</span></p>
                        <p class="mt-2 mb-0"><small class="text-muted">Date: {{ order.date|date:"F d, Y H:i" }}</small></p>
                    </div>
                    
                    <div class="mt-4">
                        <a href="{% url 'inventory_list' %}" class="btn btn-primary">Continue Shopping</a>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">Go Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
