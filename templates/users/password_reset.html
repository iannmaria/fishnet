{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width:400px;">
  <h3 class="mb-4">Forgot Password?</h3>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-warning w-100">Reset Password</button>
  </form>
</div>
{% endblock %}
